# Global Infisical defaults — inherited by all instances unless overridden per instance.
# projectSlug must be set here or under each instance's auth.password.infisical.
infisical:
  projectSlug: ""                              # required (if using auto password source)
  envSlug: dev                                 # optional; default: dev
  hostAPI: https://app.infisical.com/api       # optional
  resyncInterval: 60                           # optional; seconds between secret syncs
  credentialsRef:
    secretName: infisical-machine-identity     # optional; K8s Secret holding the machine identity
    secretNamespace: infisical-operator        # optional; namespace of the credentials Secret

instances: []
# List of PostgreSQL instances to deploy. Each entry supports the following fields:
#
# REQUIRED
#   name: ""                          unique name; used for StatefulSet, Service, and Secret names
#   resources:
#     requests:
#       cpu: 50m
#       memory: 128Mi
#     limits:
#       memory: 512Mi
#
# IMAGE (optional)
#   image:
#     repository: postgres            default: postgres
#     tag: "16-alpine"                default: 16-alpine
#     pullPolicy: IfNotPresent        default: IfNotPresent
#
# AUTH
#   auth:
#     adminUsername: postgres         optional; default: postgres
#     password:
#       source: auto                  optional; auto | existingSecret — default: auto
#                                       auto:           InfisicalSecret is created; Infisical Operator manages the K8s Secret
#                                       existingSecret: use a pre-existing K8s Secret (you manage it)
#       secretName: ""                optional; name of the managed K8s Secret — default: <name>-auth
#       existingSecret: ""            required when source=existingSecret; name of the pre-existing K8s Secret
#       infisical:                    optional; overrides global infisical defaults for this instance
#         projectSlug: ""
#         envSlug: dev
#         secretsPath: ""             optional; Infisical folder path — default: /<namespace>/<name>
#         resyncInterval: 60
#         hostAPI: https://app.infisical.com/api
#         credentialsRef:
#           secretName: infisical-machine-identity
#           secretNamespace: infisical-operator
#
# STORAGE (optional)
#   storage:
#     size: 1Gi                       default: 1Gi
#     storageClassName: ""            default: cluster default StorageClass
#     mountPath: /var/lib/postgresql/data   default: /var/lib/postgresql/data
#
# SERVICE (optional)
#   service:
#     type: ClusterIP                 default: ClusterIP; options: ClusterIP | NodePort | LoadBalancer
#     port: 5432                      default: 5432
#     nodePort: null                  only used when type=NodePort
#
# SECURITY CONTEXT (optional)
#   securityContext:
#     runAsUser: 999                  default: 999
#     runAsGroup: 999                 default: 999
#     fsGroup: 999                    default: 999
#
# PROBES (optional)
#   probes:
#     startup:
#       enabled: true                 default: true; set false to use tcpSocket instead of pg_isready
#       initialDelaySeconds: 10
#       periodSeconds: 10
#       timeoutSeconds: 5
#       failureThreshold: 30
#     readiness:
#       initialDelaySeconds: 10
#       periodSeconds: 10
#       timeoutSeconds: 5
#       failureThreshold: 6
#     liveness:
#       initialDelaySeconds: 30
#       periodSeconds: 20
#       timeoutSeconds: 5
#       failureThreshold: 6
#
# POSTGRESQL TUNING (optional)
#   postgresql:
#     maxConnections: "100"
#     sharedBuffers: "128MB"
#     workMem: "4MB"
#     maintenanceWorkMem: "64MB"
#     walLevel: replica
#
# INITDB SCRIPTS (optional)
#   initdbScripts:                    map of filename → SQL/shell content; mounted into /docker-entrypoint-initdb.d
#     init.sql: |
#       CREATE DATABASE mydb;
#
# ATLAS SCHEMA MANAGEMENT (optional)
#   atlas:
#     schemas:                        list of AtlasSchema resources to create for this instance
#       - name: ""                    required; AtlasSchema resource name
#         schemaConfigMap: ""         required; name of the ConfigMap containing schema.hcl (key defaults to schema.hcl)
#         schemas: [public]           optional; PostgreSQL schemas to manage (e.g. [public])
#         exclude: []                 optional; object patterns to exclude (e.g. ["public.audit_*"])
#         policy:
#           lint:
#             destructive:
#               error: true           optional; reject destructive schema changes
#
# METRICS EXPORTER (optional)
#   exporter:
#     enabled: false                  default: false; deploys postgres-exporter as a sidecar
#     image:
#       repository: quay.io/prometheuscommunity/postgres-exporter
#       tag: "v0.15.0"
#       pullPolicy: IfNotPresent
#     port: 9187
#     resources:
#       requests:
#         cpu: 10m
#         memory: 32Mi
#       limits:
#         memory: 64Mi
#
# NETWORK POLICY (optional)
#   networkPolicy:
#     enabled: false                  default: false
#     allowFromNamespaces: []         namespaces allowed to reach the instance (e.g. ["apps", "monitoring"])
#
# BACKUP CRONJOB (optional)
#   backup:
#     enabled: false                  default: false; creates a CronJob running pg_dump
#     schedule: "0 2 * * *"          default: daily at 02:00 UTC
#     successfulJobsHistoryLimit: 3
#     failedJobsHistoryLimit: 3
#     restartPolicy: OnFailure
#     storage:
#       enabled: false                set true to mount a PVC for storing dumps
#       existingClaim: ""             required when storage.enabled=true; name of the PVC
#       mountPath: /backup            default: /backup
#     command:                        optional; override the default pg_dump command
#       - /bin/sh
#       - -c
#       - pg_dump -h "$PGHOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" | gzip > /backup/dump.sql.gz
