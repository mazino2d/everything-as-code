{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gatewayName | default "eac" }}
      namespace: {{ .Values.httpRoute.gatewayNamespace | default "apps" }}
  hostnames:
    - {{ .Values.httpRoute.host }}
  rules:
    - backendRefs:
        - name: {{ .Values.name }}
          port: {{ .Values.service.port }}
{{- end }}
