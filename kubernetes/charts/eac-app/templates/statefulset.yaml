{{- if eq .Values.workload "statefulset" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ .Values.name }}-headless
  replicas: {{ .Values.statefulset.replicaCount | default 1 }}
  updateStrategy:
    type: {{ .Values.statefulset.updateStrategy.type | default "RollingUpdate" }}
    {{- if eq (.Values.statefulset.updateStrategy.type | default "RollingUpdate") "RollingUpdate" }}
    rollingUpdate:
      partition: {{ .Values.statefulset.updateStrategy.partition | default 0 }}
    {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsPolicy: None
      dnsConfig:
        {{- toYaml .Values.dnsConfig | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          {{- if .Values.command }}
          command: {{ toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args: {{ toYaml .Values.args | nindent 12 }}
          {{- end }}
          {{- $parsedSecretEnvEntries := dict "items" (list) }}
          {{- $secretEnvFromRefs := dict "enabled" false }}
          {{- range .Values.secrets }}
          {{- if and (kindIs "string" .) (contains "=" .) }}
          {{- $parts := splitList "=" . }}
          {{- if lt (len $parts) 2 }}
          {{- fail (printf "invalid secrets entry %q: expected ENV_NAME=secretName:key" .) }}
          {{- end }}
          {{- $envName := trim (index $parts 0) }}
          {{- if eq $envName "" }}
          {{- fail (printf "invalid secrets entry %q: empty ENV_NAME" .) }}
          {{- end }}
          {{- $envValue := trim (join "=" (slice $parts 1)) }}
          {{- $mappingParts := splitList ":" $envValue }}
          {{- if and (eq (len $mappingParts) 2) (ne (trim (index $mappingParts 0)) "") (ne (trim (index $mappingParts 1)) "") }}
          {{- $_ := set $parsedSecretEnvEntries "items" (append (index $parsedSecretEnvEntries "items") (dict "name" $envName "secretName" (trim (index $mappingParts 0)) "key" (trim (index $mappingParts 1)))) }}
          {{- else }}
          {{- fail (printf "invalid secrets entry %q: expected ENV_NAME=secretName:key — for plain config use env:" .) }}
          {{- end }}
          {{- else if and (kindIs "string" .) . }}
          {{- $_ := set $secretEnvFromRefs "enabled" true }}
          {{- end }}
          {{- end }}
          ports:
            {{- range .Values.service.ports }}
            - containerPort: {{ .containerPort }}
              {{- if .name }}
              name: {{ .name }}
              {{- end }}
            {{- end }}
          {{- if or .Values.env (gt (len (index $parsedSecretEnvEntries "items")) 0) }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range (index $parsedSecretEnvEntries "items") }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .key }}
            {{- end }}
          {{- end }}
          {{- if or .Values.env (index $secretEnvFromRefs "enabled") }}
          envFrom:
            {{- if .Values.env }}
            - configMapRef:
                name: {{ .Values.name }}
            {{- end }}
            {{- range .Values.secrets }}
            {{- if not (contains "=" .) }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if .Values.statefulset.storage.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.statefulset.storage.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  {{- if .Values.statefulset.storage.enabled }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.statefulset.storage.size }}
  {{- end }}
{{- end }}
