name: dnsync
schedule: "*/5 * * * *"

serviceAccountName: dnsync

image:
  repository: alpine/k8s
  tag: "1.31.4"

command: ["/bin/sh", "-c"]
args:
  - |
    IP=$(kubectl get ingress -A -o jsonpath='{.items[*].status.loadBalancer.ingress[0].ip}' \
      | tr ' ' '\n' | grep -v '^$' | head -1)
    [ -z "$IP" ] && echo "No ingress IP found" && exit 1
    RESULT=$(curl -sf "https://www.duckdns.org/update?domains=mazino2d-k3s&token=${DUCKDNS_TOKEN}&ip=${IP}")
    echo "dnsync: $IP -> $RESULT"

infisical:
  enabled: true
  projectSlug: everything-as-code
  envSlug: dev

envFromSecrets:
  - DUCKDNS_TOKEN=dnsync-env:DUCKDNS_TOKEN

resources:
  requests:
    cpu: 10m
    memory: 16Mi
