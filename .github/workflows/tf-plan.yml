name: Terraform Plan

on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect terraform changes
        id: filter
        run: |
          changed_files="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"

          all_stacks=(
            "terraform/github"
            "terraform/gcp/mazino2d-as-se1-dev"
            "terraform/infisical"
            "terraform/grafana"
            "terraform/k8s"
          )

          changed_stacks=()
          for stack in "${all_stacks[@]}"; do
            if echo "$changed_files" | grep -qE "^${stack}/"; then
              changed_stacks+=("$stack")
            fi
          done


          if [ ${#changed_stacks[@]} -gt 0 ]; then
            echo "terraform=true" >> $GITHUB_OUTPUT
            echo "🔧 Detected changes in: $(IFS=, ; echo "${changed_stacks[*]}")"
            matrix_json="$(printf '%s\n' "${changed_stacks[@]}" | jq -R . | jq -cs '{stack: .}')"
          else
            echo "terraform=false" >> $GITHUB_OUTPUT
            echo "✅ No Terraform changes detected"
            matrix_json='{"stack":[]}'
          fi


          echo "matrix=${matrix_json}" >> $GITHUB_OUTPUT

  terraform-plan:
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: terraform init

      - name: Plan
        id: plan
        run: |
          set -o pipefail
          plan_exit_code=0
          for i in 1 2 3; do
            terraform plan -no-color 2>&1 | tee /tmp/plan_output.txt
            plan_exit_code=$?
            
            if [ $plan_exit_code -eq 0 ]; then
              break
            fi
            if ! grep -qE "Failed to install provider|connection reset by peer" /tmp/plan_output.txt; then
              break
            fi
            [ $i -lt 3 ] && echo "⏳ Attempt $i failed due to provider download error, retrying in 15s..." && sleep 15
          done

          # Check if plan has any changes
          if grep -qE "^Plan: [0-9]+ to (add|change|destroy)" /tmp/plan_output.txt; then
            plan_line="$(grep -E "^Plan: [0-9]+ to (add|change|destroy)" /tmp/plan_output.txt | head -1)"
            # Extract numbers: if any is > 0, we have changes
            if echo "$plan_line" | grep -qE "Plan: ([1-9][0-9]* to add|[1-9][0-9]* to change|[1-9][0-9]* to destroy)"; then
              echo "📝 Plan summary: $plan_line"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

          # Exit 0 for success (regardless of changes), exit 1 only for actual errors
          [ $plan_exit_code -eq 0 ] && exit 0
          exit 1
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const summary = output.match(/Plan: .+|No changes\..+/)?.[0] ?? 'Plan failed — see details';
            const planOutcome = '${{ steps.plan.outcome }}';
            const hasChanges = '${{ steps.plan.outputs.has_changes }}' === 'true';
            const status = planOutcome === 'success' ? '✅' : '❌';
            const stack = '${{ matrix.stack }}';
            const marker = `<!-- tf-plan:${stack} -->`;


            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            // Keep PR clean: no comment for successful no-op plans.
            if (planOutcome === 'success' && !hasChanges) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const body = [
              marker,
              `## ${status} \`${stack}\``,
              `**${summary}**`,
              '',
              '<details><summary>Full output</summary>',
              '',
              '```',
              output.slice(-60000),
              '```',
              '</details>',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  check-terraform:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - terraform-plan
    if: always()
    steps:
      - name: Verify all plan jobs passed
        run: |
          if [[ "${{ needs.detect-changes.outputs.terraform }}" != "true" ]]; then
            echo "No terraform changes, skipping plan check"
            exit 0
          fi
          if [[ "${{ needs.terraform-plan.result }}" != "success" ]]; then
            echo "terraform-plan result: ${{ needs.terraform-plan.result }}"
            exit 1
          fi
