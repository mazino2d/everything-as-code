tree:
  apps:
    app-db:
      secrets:
        - key: admin_password
          generate:
            length: 32
            special: true
            override_special: "!#$%&*()-_=+[]{}<>:?"
  monitoring:
    grafana-alloy:
      secrets:
        - key: grafana_api_key
          generate:
            length: 64
            special: true
            override_special: "!#$%&*()-_=+[]{}<>:?"
