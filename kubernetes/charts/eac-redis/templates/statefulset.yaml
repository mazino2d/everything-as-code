{{- $root := . -}}
{{- range .Values.instances }}
{{- $exporterEnabled := dig "exporter" "enabled" false . }}
{{- $exporterPort := dig "exporter" "port" 9121 . }}
{{- $redisPort := .service.port | default 6379 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .name }}
  namespace: {{ $root.Release.Namespace }}
spec:
  serviceName: {{ .name }}-headless
  replicas: {{ .replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
      {{- if $exporterEnabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $exporterPort | quote }}
      {{- end }}
    spec:
      containers:
        - name: {{ .name }}
          image: redis:{{ dig "image" "tag" "7-alpine" . }}
          command: ["/bin/sh", "/scripts/start.sh"]
          ports:
            - containerPort: {{ $redisPort }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: data
              mountPath: {{ .storage.mountPath | default "/data" }}
          resources:
            {{- toYaml .resources | nindent 12 }}
        {{- if $exporterEnabled }}
        - name: redis-exporter
          image: oliver006/redis_exporter:{{ dig "exporter" "image" "tag" "v1.67.0" . }}
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:{{ $redisPort }}"
            {{- if dig "redis" "requirepass" "" . }}
            - name: REDIS_PASSWORD
              value: {{ dig "redis" "requirepass" "" . | quote }}
            {{- end }}
          ports:
            - containerPort: {{ $exporterPort }}
          resources:
            {{- with dig "exporter" "resources" nil . }}
            {{- toYaml . | nindent 12 }}
            {{- else }}
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
            {{- end }}
        {{- end }}
      volumes:
        - name: scripts
          configMap:
            name: {{ .name }}-startup
            defaultMode: 0755
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .storage.size | default "100Mi" }}
{{- end }}
