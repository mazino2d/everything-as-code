apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gce-gateway
  - istio
  - cert-manager
  - atlas-operator
  - infisical-operator
  - velero
  - dnsync
  - argo-rollouts
patches:
  - target:
      group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    patch: |-
      - op: add
        path: /spec/preserveUnknownFields
        value: false
      - op: remove
        path: /spec/preserveUnknownFields
