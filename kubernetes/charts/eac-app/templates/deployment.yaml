{{- include "eac-app.validateWorkload" . -}}
{{- $argoStrategies := list "BlueGreen" "ReplicaCanary" "MeshTrafficCanary" }}
{{- if and (eq .Values.workload "deployment") (not (has .Values.deployment.rollout.strategy $argoStrategies)) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- if not .Values.deployment.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicaCount }}
  {{- end }}
  strategy:
    type: {{ .Values.deployment.rollout.strategy | default "RollingUpdate" }}
    {{- if eq (.Values.deployment.rollout.strategy | default "RollingUpdate") "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.rollout.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.deployment.rollout.maxUnavailable | default 0 }}
    {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        {{- if .Values.podLabels }}
        {{- toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.instrumentation.enabled }}
      annotations:
        {{- if .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- end }}
        {{- if .Values.instrumentation.enabled }}
        instrumentation.opentelemetry.io/inject-python: {{ .Values.name }}
        {{- end }}
      {{- end }}
    spec:
      {{- include "eac-app.podSpec" . | nindent 6 }}
{{- end }}
