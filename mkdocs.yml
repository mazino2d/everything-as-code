      - "07 · DaemonSets": posts/kubernetes/07-kubernetes-daemonset.md
      - "08 · Jobs & CronJobs": posts/kubernetes/08-kubernetes-job-cronjob.md
    - "Chapter 3 — Networking":
      - "09 · Services": posts/kubernetes/09-kubernetes-service.md
      - "10 · Ingress": posts/kubernetes/10-kubernetes-ingress.md
    - "Chapter 4 — Storage":
