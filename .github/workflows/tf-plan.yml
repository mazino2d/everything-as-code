name: Terraform Plan

on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect terraform changes
        id: filter
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^terraform/|^\.github/workflows/tf-plan\.yml'; then
            echo "terraform=true" >> $GITHUB_OUTPUT
          else
            echo "terraform=false" >> $GITHUB_OUTPUT
          fi

  terraform-plan:
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
    strategy:
      matrix:
        stack:
          - terraform/github
          - terraform/gcp/mazino2d-as-se1-dev
          - terraform/infisical
          - terraform/grafana
    defaults:
      run:
        working-directory: ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: terraform init

      - name: Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const summary = output.match(/Plan: .+|No changes\..+/)?.[0] ?? 'Plan failed — see details';
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const stack = '${{ matrix.stack }}';
            const marker = `<!-- tf-plan:${stack} -->`;

            const body = [
              marker,
              `## ${status} \`${stack}\``,
              `**${summary}**`,
              '',
              '<details><summary>Full output</summary>',
              '',
              '```',
              output.slice(-60000),
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  check-terraform:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - terraform-plan
    if: always()
    steps:
      - name: Verify all plan jobs passed
        run: |
          if [[ "${{ needs.detect-changes.outputs.terraform }}" != "true" ]]; then
            echo "No terraform changes, skipping plan check"
            exit 0
          fi
          if [[ "${{ needs.terraform-plan.result }}" != "success" ]]; then
            echo "terraform-plan result: ${{ needs.terraform-plan.result }}"
            exit 1
          fi
