name: k8s Deploy

on:
  push:
    branches:
      - main
    paths:
      - "kubernetes/clusters/**"
      - "kubernetes/charts/**"
      - ".github/workflows/k8s-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: k8s-${{ matrix.cluster }}
    strategy:
      matrix:
        cluster:
          - mazino2d-as-se1-dev
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - uses: azure/setup-helm@v4

      - uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy
        run: |
          for dir in kubernetes/clusters/${{ matrix.cluster }}/*/; do
            kustomize build --enable-helm "$dir" | kubectl apply -f -
          done
