# REQUIRED
name: ""                  # used for all resource names (Deployment/StatefulSet, Service, ConfigMap)

# IMAGE
image:
  repository: ""          # required; container image (e.g. ghcr.io/org/app)
  tag: latest             # optional; default: latest — pin to a specific tag in production

# CONTAINER COMMAND
command: []               # optional; override container entrypoint
args: []                  # optional; override container args

# POD ANNOTATIONS
podAnnotations: {}        # optional; extra annotations added to the pod template

# POD LABELS
podLabels: {}             # optional; extra labels added to the pod template

# WORKLOAD TYPE
# Configure exactly one. Specifying an unrecognised value is an error.
workload: deployment      # required; deployment | statefulset

# DEPLOYMENT MODE
# autoscaling and rollout only apply when workload is deployment.
deployment:
  replicaCount: 1         # optional; default: 1 — ignored when autoscaling.enabled is true

  # AUTOSCALING (Horizontal Pod Autoscaler)
  # When enabled, an HPA is created targeting the active workload (Deployment or Rollout).
  # replicaCount is ignored when autoscaling is enabled — the HPA has sole authority over replica counts.
  autoscaling:
    enabled: false                          # optional; default: false
    minReplicas: 1                          # optional; default: 1
    maxReplicas: 3                          # optional; default: 3
    targetCPUUtilizationPercentage: 80      # optional; omit or leave empty to disable CPU scaling
    targetMemoryUtilizationPercentage: ""   # optional; omit or leave empty to disable memory scaling

  # ROLLOUT STRATEGY
  # BlueGreen | ReplicaCanary | MeshTrafficCanary require Argo Rollouts (infra/argo-rollouts).
  # MeshTrafficCanary requires Istio sidecar injection enabled on the namespace.
  rollout:
    strategy: RollingUpdate      # optional; RollingUpdate | Recreate | BlueGreen | ReplicaCanary | MeshTrafficCanary — default: RollingUpdate
    # RollingUpdate params:
    maxSurge: 1                  # optional; max extra pods during update — default: 1
    maxUnavailable: 0            # optional; max pods unavailable during update — default: 0
    # BlueGreen params:
    autoPromotionEnabled: false  # optional; default: false — manual promote via: kubectl argo rollouts promote <name>
    previewReplicaCount: 1       # optional; replicas for the inactive (preview) version — default: 1
    scaleDownDelaySeconds: 30    # optional; seconds to keep old version after promotion — default: 30
    # ReplicaCanary | MeshTrafficCanary params:
    steps: []                    # optional; list of canary steps — see example below
    # steps:
    #   - setWeight: 25
    #   - pause: {}              # manual gate — resume via: kubectl argo rollouts promote <name>
    #   - setWeight: 75
    #   - pause: {}

# STATEFULSET MODE
# updateStrategy and storage only apply when workload is statefulset.
statefulset:
  replicaCount: 1         # optional; default: 1

  # UPDATE STRATEGY
  updateStrategy:
    type: RollingUpdate   # optional; RollingUpdate | OnDelete — default: RollingUpdate
    # RollingUpdate params:
    partition: 0          # optional; only update pods with ordinal >= partition — default: 0 (update all)

  # PERSISTENT STORAGE
  # When enabled, a PVC is provisioned per replica via volumeClaimTemplates.
  # volumeClaimTemplates is immutable — changing this after first deploy requires deleting the StatefulSet.
  # Disabling storage after enabling will leave orphaned PVCs that must be deleted manually.
  storage:
    enabled: false        # optional; default: false — provisions a PVC per replica
    size: 1Gi             # optional; default: 1Gi
    mountPath: /data      # optional; default: /data
    storageClassName: ""  # optional; default: cluster default StorageClass

# RESOURCES
resources:                # required; always set limits to avoid unbounded resource usage
  requests:
    cpu: 10m
    memory: 64Mi
  # limits:
  #   memory: 128Mi

# SECRETS
# Injected before env — secret values can be referenced in env via $(VAR_NAME) expansion.
# Two formats supported:
#   - "my-secret"                              inject all keys from the Secret via envFrom (bulk inject)
#   - "ENV_NAME=my-secret:SECRET_KEY"          inject one key as a named env var (valueFrom.secretKeyRef)
secrets: []
# e.g.
# secrets:
#   - my-app-env                               # bulk: all keys from Secret "my-app-env"
#   - DB_PASSWORD=app-db-auth:POSTGRES_PASSWORD

# ENVIRONMENT VARIABLES
# Plain key-value pairs — rendered into a ConfigMap and injected via envFrom.
# Secrets are available here via $(VAR_NAME) expansion (e.g. DATABASE_URL: "postgres://user:$(DB_PASSWORD)@host/db").
env: {}
# e.g.
# env:
#   LOG_LEVEL: info
#   DATABASE_URL: "postgres://user:$(DB_PASSWORD)@host:5432/db"

# SERVICE
service:
  type: ""                # optional; ClusterIP | NodePort | LoadBalancer — omit to use K8s default (ClusterIP)
  ports:
    - port: 80            # optional; port exposed by the Service — default: 80
      containerPort: 80   # optional; port the container listens on — default: 80
      # name: http        # optional; required by K8s when multiple ports are defined
      # nodePort: null    # optional; only when type=NodePort

# HTTP ROUTE (GKE Gateway API)
httpRoute:
  enabled: false          # optional; default: false
  gatewayName: eac        # optional; name of the Gateway resource
  gatewayNamespace: apps  # optional; namespace of the Gateway resource
  host: ""                # required when enabled; e.g. app.example.com

# DNS CONFIGURATION
dnsConfig: {}             # optional; custom DNS settings — sets dnsPolicy: None when provided
# e.g.
# dnsConfig:
#   nameservers:
#     - 8.8.8.8
#   searches:
#     - default.svc.cluster.local

# NETWORK ACCESS CONTROL LIST
# Creates a CiliumNetworkPolicy that denies all ingress and egress by default.
# DNS egress (port 53 to kube-dns) is always permitted.
# Apps with httpRoute.enabled=true automatically allow external ingress on service ports.
# Requires GKE Dataplane V2 (ADVANCED_DATAPATH) for enforcement.
nacl:
  ingress: []   # e.g. ["app/outline-db", "app/outline-cache:8080"]
  egress: []    # e.g. ["monitoring/grafana-alloy:4318", "doris.mazino2d.connect:9030"]

# SERVICE ACCOUNT
serviceAccountName: ""    # optional; name of the ServiceAccount the pod runs as

# OPENTELEMETRY INSTRUMENTATION
# Creates an Instrumentation CRD and adds the OTel inject annotation to the pod.
# Requires the OpenTelemetry Operator in the cluster. Currently targets Python apps.
instrumentation:
  enabled: false          # optional; default: false
  endpoint: http://grafana-alloy.monitoring.svc.cluster.local:4318  # optional

# INFISICAL SECRET SYNC
# Creates an InfisicalSecret CRD; the Infisical Operator syncs secrets into a K8s Secret
# which is then injected into the pod via secrets (using bulk format).
infisical:
  enabled: false          # optional; default: false — requires Infisical Operator in cluster
  projectSlug: ""         # required when enabled
  envSlug: dev            # optional; default: dev
  hostAPI: https://app.infisical.com/api  # optional
  resyncInterval: 60      # optional; seconds between secret syncs — default: 60
  secretsPath: ""         # optional; Infisical folder path — default: /<namespace>/<name>
  managedSecretName: ""   # optional; name of the managed K8s Secret — default: <name>-env
  credentialsRef:
    secretName: infisical-machine-identity   # optional
    secretNamespace: infisical-operator      # optional
