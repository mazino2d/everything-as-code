{{- $root := . -}}
{{- $globalInfisical := $root.Values.infisical | default dict -}}
{{- range .Values.instances }}
{{- $passwordSource := dig "auth" "password" "source" "auto" . }}
{{- if eq $passwordSource "auto" }}
{{- $projectSlug := dig "auth" "password" "infisical" "projectSlug" (dig "projectSlug" "" $globalInfisical) . }}
{{- $envSlug := dig "auth" "password" "infisical" "envSlug" (dig "envSlug" "dev" $globalInfisical) . }}
{{- $hostAPI := dig "auth" "password" "infisical" "hostAPI" (dig "hostAPI" "https://app.infisical.com/api" $globalInfisical) . }}
{{- $resyncInterval := dig "auth" "password" "infisical" "resyncInterval" (dig "resyncInterval" 60 $globalInfisical) . }}
{{- $credSecretName := dig "auth" "password" "infisical" "credentialsRef" "secretName" (dig "credentialsRef" "secretName" "infisical-machine-identity" $globalInfisical) . }}
{{- $credSecretNs := dig "auth" "password" "infisical" "credentialsRef" "secretNamespace" (dig "credentialsRef" "secretNamespace" "infra" $globalInfisical) . }}
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: {{ .name }}
  namespace: {{ $root.Release.Namespace }}
spec:
  hostAPI: {{ $hostAPI }}
  syncConfig:
    resyncInterval: {{ $resyncInterval }}
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: {{ $projectSlug }}
        envSlug: {{ $envSlug }}
        secretsPath: {{ dig "auth" "password" "infisical" "secretsPath" (printf "/%s/%s" $root.Release.Namespace .name) . }}
      credentialsRef:
        secretName: {{ $credSecretName }}
        secretNamespace: {{ $credSecretNs }}
  managedKubeSecretReferences:
    - secretName: {{ dig "auth" "password" "secretName" (printf "%s-auth" .name) . }}
      secretNamespace: {{ $root.Release.Namespace }}
{{- end }}
{{- end }}
