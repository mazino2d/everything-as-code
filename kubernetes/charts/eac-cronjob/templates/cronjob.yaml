apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Values.name }}
            {{- if .Values.podLabels }}
            {{- toYaml .Values.podLabels | nindent 12 }}
            {{- end }}
          {{- if .Values.podAnnotations }}
          annotations:
            {{- toYaml .Values.podAnnotations | nindent 12 }}
          {{- end }}
        spec:
          restartPolicy: {{ .Values.restartPolicy }}
          {{- if .Values.serviceAccountName }}
          serviceAccountName: {{ .Values.serviceAccountName }}
          {{- end }}
          {{- if .Values.dnsConfig }}
          dnsPolicy: None
          dnsConfig:
            {{- toYaml .Values.dnsConfig | nindent 12 }}
          {{- end }}
          containers:
            - name: {{ .Values.name }}
              image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
              {{- if .Values.command }}
              command: {{ toYaml .Values.command | nindent 16 }}
              {{- end }}
              {{- if .Values.args }}
              args: {{ toYaml .Values.args | nindent 16 }}
              {{- end }}
              {{- $parsedEnvEntries := dict "items" (list) }}
              {{- $secretEnvFromRefs := dict "enabled" false }}
              {{- range .Values.secrets }}
              {{- if and (kindIs "string" .) (contains "=" .) }}
              {{- $parts := splitList "=" . }}
              {{- if lt (len $parts) 2 }}
              {{- fail (printf "invalid secrets entry %q. expected ENV_NAME=value or ENV_NAME=secretName:key" .) }}
              {{- end }}
              {{- $envName := trim (index $parts 0) }}
              {{- if eq $envName "" }}
              {{- fail (printf "invalid secrets entry %q. empty ENV_NAME" .) }}
              {{- end }}
              {{- $envValue := trim (join "=" (slice $parts 1)) }}
              {{- $mappingParts := splitList ":" $envValue }}
              {{- if and (eq (len $mappingParts) 2) (ne (trim (index $mappingParts 0)) "") (ne (trim (index $mappingParts 1)) "") }}
              {{- $_ := set $parsedEnvEntries "items" (append (index $parsedEnvEntries "items") (dict "mode" "secret" "name" $envName "secretName" (trim (index $mappingParts 0)) "key" (trim (index $mappingParts 1)))) }}
              {{- else }}
              {{- fail (printf "invalid secrets entry %q: expected ENV_NAME=secretName:key — for plain config use env:" .) }}
              {{- end }}
              {{- else if and (kindIs "string" .) . }}
              {{- $_ := set $secretEnvFromRefs "enabled" true }}
              {{- end }}
              {{- end }}
              {{- if gt (len (index $parsedEnvEntries "items")) 0 }}
              env:
                {{- range (index $parsedEnvEntries "items") }}
                - name: {{ .name }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ .secretName }}
                      key: {{ .key }}
                {{- end }}
              {{- end }}
              {{- if or .Values.env (index $secretEnvFromRefs "enabled") }}
              envFrom:
                {{- if .Values.env }}
                - configMapRef:
                    name: {{ .Values.name }}
                {{- end }}
                {{- range .Values.secrets }}
                {{- if not (contains "=" .) }}
                - secretRef:
                    name: {{ . }}
                {{- end }}
                {{- end }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
