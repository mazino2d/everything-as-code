name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/tf-apply.yml"
  workflow_dispatch:

jobs:
  apply:
    strategy:
      matrix:
        stack:
          - terraform/github
          - terraform/gcp/mazino2d-as-se1-dev
          - terraform/infisical
          - terraform/grafana
          - terraform/k8s
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: terraform init

      - name: Apply
        run: |
          exit_code=0
          for i in 1 2 3; do
            output=$(terraform apply -auto-approve 2>&1)
            exit_code=$?
            echo "$output"
            [ $exit_code -eq 0 ] && break
            if ! echo "$output" | grep -qE "Failed to install provider|connection reset by peer"; then
              exit $exit_code
            fi
            [ $i -lt 3 ] && echo "Attempt $i failed due to provider download error, retrying in 15s..." && sleep 15
          done
          exit $exit_code
