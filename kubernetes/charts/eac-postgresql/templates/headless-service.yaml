{{- $root := . -}}
{{- range .Values.instances }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-headless
  namespace: {{ $root.Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ .name }}
  ports:
    - port: {{ dig "service" "port" 5432 . }}
      targetPort: {{ dig "service" "port" 5432 . }}
{{- end }}
