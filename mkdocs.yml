site_name: Everything as Code
site_description: DevOps principles and concepts, demonstrated through real infrastructure
site_url: https://mazino2d.github.io/everything-as-code/
repo_url: https://github.com/mazino2d/everything-as-code
repo_name: mazino2d/everything-as-code
docs_dir: blog

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - attr_list

nav:
  - Home: index.md
  - DevOps Principles:
    - "01 · DevOps Principles": posts/devops/01-devops-principles.md
    - "02 · DORA Metrics": posts/devops/02-dora-metrics.md
    - "03 · Observability": posts/devops/03-observability.md
    - "04 · Blameless Postmortem": posts/devops/04-blameless-postmortem.md
  - Kubernetes Series:
    - "Chapter 1 — Container Fundamentals":
      - "01 · Docker: Images & Containers": posts/kubernetes/01-docker-image-container.md
