name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/tf-plan.yml"

jobs:
  plan-terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: terraform/github
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: terraform init

      - name: Plan
        run: terraform plan -no-color

  plan:
    runs-on: ubuntu-latest
    needs:
      - plan-terraform
    if: ${{ always() }}
    steps:
      - name: Verify all plan jobs passed
        run: |
          if [[ "${{ needs.plan-terraform.result }}" != "success" ]]; then
            echo "plan-terraform result: ${{ needs.plan-terraform.result }}"
            exit 1
          fi
