# Cluster-wide Infisical defaults (can be overridden per instance under infisical:)
infisical:
  projectSlug: ""
  envSlug: dev
  hostAPI: https://app.infisical.com/api
  resyncInterval: 60
  credentialsRef:
    secretName: infisical-machine-identity
    secretNamespace: infra

instances: []
