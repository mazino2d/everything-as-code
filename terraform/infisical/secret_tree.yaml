tree:
  duckdns:
    dnsync:
      {}
  apps:
    outline:
      secrets:
        - key: SECRET_KEY
          environments: ["dev"]
          generate:
            mode: openssl_rand_hex_32
        - key: UTILS_SECRET
          environments: ["dev"]
          generate:
            mode: openssl_rand_hex_32
    outline-db-1:
      secrets:
        - key: POSTGRES_PASSWORD
          generate:
            length: 32
            special: false
            version: 1
  monitoring:
    grafana-alloy:
      secrets:
        - key: PROMETHEUS_URL
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_prometheus_remote_endpoint
            format: "%s/push"
        - key: PROMETHEUS_USERNAME
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_prometheus_username
        - key: PROMETHEUS_PASSWORD
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_prometheus_password
        - key: LOKI_URL
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_loki_endpoint
            format: "%s/loki/api/v1/push"
        - key: LOKI_USERNAME
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_loki_username
        - key: LOKI_PASSWORD
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_loki_password
        - key: TEMPO_URL
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_tempo_endpoint_without_scheme
            format: "%s:443"
        - key: TEMPO_USERNAME
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_tempo_username
        - key: TEMPO_PASSWORD
          environments: ["dev"]
          remote_state:
            workspace: grafana-stack
            output: dev_tempo_password
