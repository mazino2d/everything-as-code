apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
helmGlobals:
  chartHome: ../../../charts
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
configMapGenerator:
  - name: hotrod-db-schema
    files:
      - hotrod/schema.hcl
resources:
  - namespace.yaml
  - hotrod
  - httpbin
helmCharts:
  - name: eac-redis
    releaseName: redis
    valuesFile: redis.yml
  - name: eac-postgresql
    releaseName: postgresql
    valuesFile: postgresql.yml
    valuesInline:
      infisical:
        projectSlug: everything-as-code
        envSlug: dev
