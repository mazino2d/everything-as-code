{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  {{- $hasTlsIssuer := and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
  {{- $hasCustomAnnotations := .Values.ingress.annotations }}
  {{- $hasGroup := .Values.ingress.group }}
  {{- if or $hasTlsIssuer $hasCustomAnnotations $hasGroup }}
  annotations:
    {{- if $hasTlsIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    {{- if $hasGroup }}
    networking.gke.io/ingress-group: {{ .Values.ingress.group }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
{{ toYaml . | indent 4 }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ default (printf "%s-tls" .Values.name) .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
