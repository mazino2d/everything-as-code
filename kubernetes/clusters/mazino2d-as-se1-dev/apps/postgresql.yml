instances:
  - name: outline-db-1
    replicaCount: 1
    image:
      repository: postgres
      tag: "16-alpine"
    auth:
      adminUsername: postgres
      password:
        source: auto
        infisical:
          enabled: true
    storage:
      size: 2Gi
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        memory: 256Mi
    postgresql:
      maxConnections: "100"
      sharedBuffers: "128MB"
      workMem: "4MB"
      maintenanceWorkMem: "64MB"
      walLevel: "replica"
    exporter:
      enabled: true
    backup:
      enabled: false
      schedule: "0 2 * * *"
      storage:
        enabled: false
        existingClaim: ""
        mountPath: /backup