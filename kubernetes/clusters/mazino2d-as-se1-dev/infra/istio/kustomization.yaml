apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.28.6
    releaseName: istio-base
    namespace: istio-system
    includeCRDs: true
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.28.6
    releaseName: istiod
    namespace: istio-system
    valuesInline:
      meshConfig:
        enableAutoMtls: false
      pilot:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
      global:
        proxy:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
patches:
  - target:
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
    patch: |
      - op: replace
        path: /webhooks/0/failurePolicy
        value: Fail
  - target:
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
    patch: |
      - op: replace
        path: /webhooks/0/failurePolicy
        value: Fail

resources:
  - namespace.yaml
  - peer-authentication.yaml
