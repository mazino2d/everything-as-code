apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: 2.37.7
    releaseName: argo-rollouts
    namespace: argo-rollouts
    includeCRDs: true
    valuesInline:
      dashboard:
        enabled: true
resources:
  - namespace.yaml
