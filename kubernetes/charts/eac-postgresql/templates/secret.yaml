{{- $root := . -}}
{{- range .Values.instances }}
{{- $passwordSource := dig "auth" "password" "source" "auto" . }}
{{- $infisicalEnabled := dig "auth" "password" "infisical" "enabled" true . }}
{{- if and (eq $passwordSource "auto") (not $infisicalEnabled) }}
{{- $secretName := dig "auth" "password" "secretName" (printf "%s-auth" .name) . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $root.Release.Namespace }}
type: Opaque
stringData:
  admin_password: change-me
{{- end }}
{{- end }}
