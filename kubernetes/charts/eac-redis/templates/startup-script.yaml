{{- $root := . -}}
{{- range .Values.instances }}
{{- $port := dig "service" "port" 6379 . }}
{{- $primaryHost := printf "%s-0.%s-headless.%s.svc.cluster.local" .name .name $root.Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .name }}-startup
  namespace: {{ $root.Release.Namespace }}
data:
  start.sh: |
    #!/bin/sh
    ORDINAL=$(echo $HOSTNAME | awk -F'-' '{print $NF}')
    ARGS="--port {{ $port }}"
    {{- with .redis }}
    {{- if .maxmemory }}
    ARGS="$ARGS --maxmemory {{ .maxmemory }}"
    {{- end }}
    {{- if .maxmemoryPolicy }}
    ARGS="$ARGS --maxmemory-policy {{ .maxmemoryPolicy }}"
    {{- end }}
    {{- if .appendonly }}
    ARGS="$ARGS --appendonly {{ .appendonly }}"
    {{- end }}
    {{- if .save }}
    ARGS="$ARGS --save {{ .save }}"
    {{- end }}
    {{- if .requirepass }}
    ARGS="$ARGS --requirepass {{ .requirepass }}"
    {{- end }}
    {{- end }}
    if [ "$ORDINAL" = "0" ]; then
      exec redis-server $ARGS
    else
      exec redis-server $ARGS --replicaof {{ $primaryHost }} {{ $port }}
    fi
{{- end }}
