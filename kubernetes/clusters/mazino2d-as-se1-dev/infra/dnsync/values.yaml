name: dnsync
schedule: "*/5 * * * *"

image:
  repository: alpine/curl
  tag: latest

command: ["/bin/sh", "-c"]
args:
  - |
    IP=$(curl -sf -H "Metadata-Flavor: Google" \
      http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip)
    [ -z "$IP" ] && echo "No external IP found" && exit 1
    RESULT=$(curl -sf "https://www.duckdns.org/update?domains=mazino2d-k3s&token=${DUCKDNS_TOKEN}&ip=${IP}")
    echo "dnsync: $IP -> $RESULT"

infisical:
  enabled: true
  projectSlug: everything-as-code
  envSlug: dev

envFromSecrets:
  - DUCKDNS_TOKEN=dnsync-env:DUCKDNS_TOKEN

resources:
  requests:
    cpu: 10m
    memory: 16Mi
