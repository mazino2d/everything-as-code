tree:
  apps:
    app-db:
      secrets:
        - key: admin_password
          generate:
            length: 32
            special: true
            override_special: "!#$%&*()-_=+[]{}<>:?"
  monitoring:
    grafana-alloy:
      secrets:
        - key: PROMETHEUS_URL
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_prometheus_remote_endpoint
            format: "%s/push"
        - key: PROMETHEUS_USERNAME
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_prometheus_username
        - key: PROMETHEUS_PASSWORD
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_prometheus_password
        - key: LOKI_URL
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_loki_endpoint
            format: "%s/loki/api/v1/push"
        - key: LOKI_USERNAME
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_loki_username
        - key: LOKI_PASSWORD
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_loki_password
        - key: TEMPO_URL
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_tempo_endpoint_without_scheme
            format: "%s:443"
        - key: TEMPO_USERNAME
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_tempo_username
        - key: TEMPO_PASSWORD
          environments: ["dev"]
          remote_state:
            workspace: grafana
            output: dev_tempo_password
