apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: protect-platform-namespace
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["namespaces"]
  validations:
    - expression: "request.name != 'platform'"
      message: "Deletion of namespace platform is blocked by policy"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: protect-platform-namespace
spec:
  policyName: protect-platform-namespace
  validationActions:
    - Deny
