name: adminer
replicaCount: 1
image:
  repository: adminer
  tag: 4.8.1-standalone
service:
  type: ClusterIP
  port: 8080
  containerPort: 8080
httpRoute:
  enabled: true
  host: adminer.mazino2d-k3s.duckdns.org
env:
  ADMINER_DEFAULT_SERVER: app-db.apps.svc.cluster.local
resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 128Mi
