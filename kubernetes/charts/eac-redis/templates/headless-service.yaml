{{- $root := . -}}
{{- range .Values.instances }}
{{- $port := dig "service" "port" 6379 . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-headless
  namespace: {{ $root.Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ .name }}
  ports:
    - port: {{ $port }}
      targetPort: {{ $port }}
{{- end }}
